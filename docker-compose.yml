services:
  mcp:
    build: .
    environment:
      APP_MODE: mcp
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost',8081)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  senku:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: 8000
      MCP_HOST: mcp
    depends_on:
      mcp:
        condition: service_healthy
    restart: unless-stopped
